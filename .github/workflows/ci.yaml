name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Fonts
        run: |
          mkdir -p ~/.fonts
          cp -r tests/_fonts/* ~/.fonts

      # - name: Install tytanic
      #   uses: taiki-e/cache-cargo-install-action@v3
      #   with:
      #     tool: tytanic@0.3.3

      - name: Download tytanic binary
        run: |
          wget https://github.com/typst-community/tytanic/releases/download/v0.3.3/tytanic-x86_64-unknown-linux-musl.tar.xz  -O tt.tar.xz
          tar -xf tt.tar.xz
          mv tytanic-x86_64-unknown-linux-musl/tt .

      - name: Run test suite
        run: ./tt run --use-system-fonts

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artifacts
          path: |
            tests/**/diff/*.png
            tests/**/out/*.png
            tests/**/ref/*.png
          retention-days: 5
